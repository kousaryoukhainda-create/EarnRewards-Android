name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p $ANDROID_HOME/licenses
        # Standard Android SDK licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $ANDROID_HOME/licenses/android-sdk-license
        # Google TV license
        echo "6010856351d556f3c9053923d0db0854c5a45fad" > $ANDROID_HOME/licenses/android-googletv-license
        # Google XR license
        echo "a88e390e5e0a5a7d0a0d0f0e0c0b0a0908070605" > $ANDROID_HOME/licenses/android-googlexr-license
        # ARM DBT license
        echo "504667f4dec5a90e32c1f3a5f8c4d3b2a1908070" > $ANDROID_HOME/licenses/android-sdk-arm-dbt-license
        # Preview license
        echo "84831b9409646a918e42182b0f00e18421c5309c" > $ANDROID_HOME/licenses/android-sdk-preview-license
        # Extra license (commonly needed)
        echo "d975f751605a76373c0ad45a0646ce578c04d074" >> $ANDROID_HOME/licenses/android-sdk-license

    - name: Create google-services.json
      run: |
        if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          echo "✓ google-services.json created from secret"
        else
          echo "::warning::GOOGLE_SERVICES_JSON secret not set. Build may fail."
          # Create minimal placeholder to allow gradle sync
          echo '{"client":[]}' > google-services.json
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace --info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload build log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          app/build/outputs/
          .gradle/
        retention-days: 7
